"$schema" = 'https://starship.rs/config-schema.json'

# --- THE LAYOUT ---
format = """
[░▒▓█](color_main)\
$os\
$username\
[](bg:color_accent fg:color_main)\
$directory\
[](bg:color_git fg:color_accent)\
$git_branch\
$git_status\
[](fg:color_git bg:color_lang)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:color_lang bg:color_sys)\
$docker_context\
$conda\
[](fg:color_sys bg:color_time)\
$time\
[ ](fg:color_time)\
$cmd_duration\
$line_break$character"""

palette = 'nord'

# --- OS & USER ---
[os]
disabled = false
style = "bg:color_main fg:crust"
format = '[$symbol ]($style)'

[os.symbols]
Windows = ""
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "󰣇"
Artix = "󰣇"
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"

[username]
show_always = false 
style_user = "bg:color_main fg:crust"
style_root = "bg:color_main fg:crust"
format = '[$user]($style)'

# --- DIRECTORY ---
[directory]
style = "bg:color_accent fg:crust"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

# --- GIT ---
[git_branch]
symbol = ""
style = "bg:color_git"
format = '[[ $symbol $branch ](fg:crust bg:color_git)]($style)'

[git_status]
style = "bg:color_git"
format = '[[($all_status$ahead_behind )](fg:crust bg:color_git)]($style)'

# --- LANGUAGES (Generic color_lang) ---
[nodejs]
symbol = ""
style = "bg:color_lang"
format = '[[ $symbol( $version) ](fg:crust bg:color_lang)]($style)'

[c]
symbol = " "
style = "bg:color_lang"
format = '[[ $symbol( $version) ](fg:crust bg:color_lang)]($style)'

[rust]
symbol = ""
style = "bg:color_lang"
format = '[[ $symbol( $version) ](fg:crust bg:color_lang)]($style)'

[golang]
symbol = ""
style = "bg:color_lang"
format = '[[ $symbol( $version) ](fg:crust bg:color_lang)]($style)'

[php]
symbol = ""
style = "bg:color_lang"
format = '[[ $symbol( $version) ](fg:crust bg:color_lang)]($style)'

[java]
symbol = " "
style = "bg:color_lang"
format = '[[ $symbol( $version) ](fg:crust bg:color_lang)]($style)'

[kotlin]
symbol = ""
style = "bg:color_lang"
format = '[[ $symbol( $version) ](fg:crust bg:color_lang)]($style)'

[haskell]
symbol = ""
style = "bg:color_lang"
format = '[[ $symbol( $version) ](fg:crust bg:color_lang)]($style)'

[python]
symbol = ""
style = "bg:color_lang"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:crust bg:color_lang)]($style)'

# --- SYSTEM & TOOLS ---
[docker_context]
symbol = ""
style = "bg:color_sys"
format = '[[ $symbol( $context) ](fg:crust bg:color_sys)]($style)'

[conda]
symbol = "  "
style = "fg:crust bg:color_sys"
format = '[$symbol$environment ]($style)'
ignore_base = false

[time]
disabled = false
time_format = "%R"
style = "bg:color_time"
format = '[[  $time ](fg:crust bg:color_time)]($style)'

[cmd_duration]
disabled = false
show_milliseconds = false
format = " in $duration "
style = "bg:color_time"
min_time_to_notify = 45000

# --- PROMPT CHARACTER ---
[character]
disabled = false
success_symbol = '[❯](bold fg:color_success)'
error_symbol = '[❯](bold fg:color_error)'
vimcmd_symbol = '[❮](bold fg:color_success)'
vimcmd_replace_one_symbol = '[❮](bold fg:color_replace)'
vimcmd_replace_symbol = '[❮](bold fg:color_replace)'
vimcmd_visual_symbol = '[❮](bold fg:color_visual)'

[line_break]
disabled = false

# --- DYNAMIC PALETTE (Catppuccin Macchiato Defaults) ---
[palettes.catppuccin_macchiato]
